<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .header h1 {
      color: white;
      font-size: 24px;
      font-weight: 600;
    }
    
    .back-btn {
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    
    .back-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-1px);
    }
    
    .clear-all-btn {
      padding: 10px 20px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      color: #ffebee;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    
    .clear-all-btn:hover {
      background: rgba(244, 67, 54, 0.3);
      border-color: #f44336;
    }
    
    .stats {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: white;
      font-size: 14px;
    }
    
    .job-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .job-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .job-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    
    .job-title {
      font-size: 16px;
      font-weight: 700;
      color: #333;
      margin-bottom: 4px;
    }
    
    .job-company {
      font-size: 13px;
      color: #667eea;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .job-score {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .score-high { background: #e8f5e9; color: #2e7d32; }
    .score-mid { background: #fff3e0; color: #e65100; }
    .score-low { background: #ffebee; color: #c62828; }
    
    .job-url {
      font-size: 11px;
      color: #999;
      font-family: monospace;
      margin-bottom: 12px;
      word-break: break-all;
    }
    
    .job-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    
    .go-btn {
      flex: 1;
      padding: 8px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    
    .go-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    
    .delete-btn {
      flex: 1;
      padding: 8px 16px;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      color: #f44336;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    
    .delete-btn:hover {
      background: #ffebee;
      border-color: #f44336;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      color: #666;
    }
    
    .empty-state p {
      margin-bottom: 20px;
    }
    
    .empty-state button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    
    .saved-date {
      font-size: 10px;
      color: #bbb;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Saved Jobs</h1>
      <div style="display: flex; gap: 12px;">
        <button id="clearAllBtn" class="clear-all-btn">Clear All</button>
      </div>
    </div>
    
    <div id="stats" class="stats">Loading...</div>
    <div id="jobList" class="job-list"></div>
  </div>
  
  <script src="savedjobs.js"></script>
</body>
</html>
