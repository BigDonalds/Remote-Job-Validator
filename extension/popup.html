<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
      padding: 20px;
    }
    
    .header-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    
    .saved-jobs-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 20px;
      padding: 6px 12px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    
    .saved-jobs-btn:hover {
      background: rgba(255,255,255,0.35);
      transform: translateY(-1px);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .logo h1 {
      color: white;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    
    .logo p {
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      margin-top: 4px;
    }
    
    .option-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .option-btn {
      flex: 1;
      padding: 16px 8px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    
    .option-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    
    .option-btn.active {
      background: white;
      border-color: white;
    }
    
    .option-btn.active .option-title {
      color: #667eea;
    }
    
    .option-btn.active .option-desc {
      color: #667eea;
    }
    
    .option-title {
      font-size: 14px;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }
    
    .option-desc {
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      margin-top: 0px;
      line-height: 1.3;
    }
    
    .input-section {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      display: none;
    }
    
    .input-section.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .input-label {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      display: block;
    }
    
    .url-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 13px;
      font-family: monospace;
      transition: border-color 0.3s ease;
    }
    
    .url-input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .validate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 12px;
    }
    
    .validate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .info-text {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-top: 16px;
    }
    
    .status {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .status.loading {
      background: rgba(255,255,255,0.95);
      color: #667eea;
      font-weight: 600;
      backdrop-filter: blur(4px);
      animation: pulse 1.2s ease-in-out infinite, glow 1.5s ease-in-out infinite;
      border: 1px solid rgba(102, 126, 234, 0.3);
    }
    
    .status.loading .loader-text {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .status.loading .loader-text::before {
      content: '';
      width: 18px;
      height: 18px;
      border: 2px solid #e0e0e0;
      border-top-color: #667eea;
      border-right-color: #764ba2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    
    .status.loading .dots {
      display: inline-flex;
      gap: 2px;
    }
    
    .status.loading .dots span {
      animation: bounce 1.4s ease-in-out infinite;
      opacity: 0;
    }
    
    .status.loading .dots span:nth-child(1) {
      animation-delay: 0s;
    }
    
    .status.loading .dots span:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .status.loading .dots span:nth-child(3) {
      animation-delay: 0.4s;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.02); opacity: 0.95; }
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px rgba(102, 126, 234, 0.3); }
      50% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.6); }
    }
    
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    
    .status.error {
      background: #ffebee;
      color: #c62828;
      border-left: 4px solid #c62828;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <button id="savedJobsBtn" class="saved-jobs-btn">Saved Jobs</button>
    </div>
    
    <div class="logo">
      <h1>Remote Job Validator</h1>
      <p>Scam detection extension</p>
    </div>
    
    <div class="option-buttons">
      <div class="option-btn active" data-mode="current">
        <div class="option-title">Current Page</div>
        <div class="option-desc">Analyze the job you are viewing</div>
      </div>
      <div class="option-btn" data-mode="url">
        <div class="option-title">Enter URL</div>
        <div class="option-desc">Paste a job link to analyze</div>
      </div>
    </div>
    
    <div id="currentSection" class="input-section active">
      <div class="input-label">Current Tab</div>
      <div style="font-size: 12px; color: #666; margin-bottom: 12px; word-break: break-all;" id="currentUrl">Loading...</div>
    </div>
    
    <div id="urlSection" class="input-section">
      <label class="input-label">Job URL</label>
      <input type="text" id="jobUrl" class="url-input" placeholder="https://remoteok.com/remote-jobs/...">
    </div>
    
    <button id="validateBtn" class="validate-btn">Analyze Job</button>
    <div class="info-text">Real-time scam detection | Quality score | Salary analysis</div>
    <div id="status"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
